<!DOCTYPE html>
<html>
<head>
    <title>Recipe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h1>{{ recipe[1] }}</h1>

    <p><b>Category:</b> {{ recipe[2] }}</p>
    <p><b>Cooking time:</b> {{ recipe[5] }}</p>

    <h4>Ingredients</h4>
    <p>{{ recipe[3] }}</p>

    <h4>Instructions</h4>
    <p>{{ recipe[4] }}</p>

    <a class="btn btn-secondary" href="/">Back</a>

</div>

</body>
</html>

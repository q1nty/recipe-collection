<!DOCTYPE html>
<html>
<head>
    <title>Edit Recipe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h2>Edit Recipe</h2>

    <form method="POST">

        <input class="form-control mb-2" name="title" value="{{ recipe[1] }}">
        <input class="form-control mb-2" name="category" value="{{ recipe[2] }}">
        <textarea class="form-control mb-2" name="ingredients">{{ recipe[3] }}</textarea>
        <textarea class="form-control mb-2" name="instructions">{{ recipe[4] }}</textarea>
        <input class="form-control mb-2" name="cooking_time" value="{{ recipe[5] }}">

        <button class="btn btn-primary">Update</button>

    </form>

</div>

</body>
</html>

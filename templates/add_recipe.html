<!DOCTYPE html>
<html>
<head>
    <title>Добавить рецепт</title>
</head>
<body>

<h1>Добавить рецепт</h1>

<form method="POST">

    <input
        type="text"
        name="title"
        placeholder="Название"
        required
    >

    <br><br>

    <input
        type="text"
        name="category"
        placeholder="Категория"
        required
    >

    <br><br>

    <textarea
        name="ingredients"
        placeholder="Ингредиенты"
        required
    ></textarea>

    <br><br>

    <textarea
        name="instructions"
        placeholder="Способ приготовления"
        required
    ></textarea>

    <br><br>

    <input
        type="text"
        name="cooking_time"
        placeholder="Время приготовления"
        required
    >

    <br><br>

    <button type="submit">
        Сохранить
    </button>

</form>

</body>
</html>

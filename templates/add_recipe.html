<!DOCTYPE html>
<html>
<head>
    <title>Add Recipe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h2>Add New Recipe</h2>

    <form method="POST">

        <input class="form-control mb-2" name="title" placeholder="Recipe title">
        <input class="form-control mb-2" name="category" placeholder="Category">
        <textarea class="form-control mb-2" name="ingredients" placeholder="Ingredients"></textarea>
        <textarea class="form-control mb-2" name="instructions" placeholder="Instructions"></textarea>
        <input class="form-control mb-2" name="cooking_time" placeholder="Cooking time">

        <button class="btn btn-success">Save</button>

    </form>

</div>

</body>
</html>

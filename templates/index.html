<!DOCTYPE html>
<html>
<head>
    <title>Recipe Collection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h1 class="mb-3">🍲 Recipe Collection</h1>

    <form class="d-flex mb-3">
        <input class="form-control me-2" name="search" placeholder="Search recipes">
        <button class="btn btn-primary">Search</button>
    </form>

    <a class="btn btn-success mb-3" href="/add">Add Recipe</a>

    {% for recipe in recipes %}
    <div class="card mb-3">
        <div class="card-body">

            <h5>{{ recipe[1] }}</h5>
            <p>Category: {{ recipe[2] }}</p>

            <a class="btn btn-sm btn-info" href="/recipe/{{ recipe[0] }}">Open</a>
            <a class="btn btn-sm btn-warning" href="/edit/{{ recipe[0] }}">Edit</a>
            <a class="btn btn-sm btn-danger" href="/delete/{{ recipe[0] }}">Delete</a>

        </div>
    </div>
    {% endfor %}

</div>

</body>
</html>
